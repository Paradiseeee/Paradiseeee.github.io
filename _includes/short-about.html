    2. 增加了分割线

{% if page.title != "Archive" %}
<section class="visible-md visible-lg">
  <hr>
  <h4><a href="{{'/about/' | prepend: site.baseurl }}">Paradise</a></h4>
  <div class="short-about">
    {% if site.sidebar-avatar %}
    <img src="{{site.sidebar-avatar}}" />
    {% endif %}
    {% if site.sidebar-about-description %}
    <p>{{site.sidebar-about-description}}
      <img src="https://github.githubassets.com/images/icons/emoji/unicode/1f64f.png" height="2px" width="2px"></p>
    {% endif %}
    <!-- SNS Link -->
    {% include sns-links.html %}
  </div>
  <hr>
</section>
{% endif %}
